name: "Source testing"

on:
    push:
        branches:
        - main
    pull_request:
    schedule:
        - cron: "20 1 * * mon"
    workflow_dispatch:
    workflow_call:

defaults:
    run:
        shell: bash -l {0} # Login shell for conda

jobs:
    unit_tests:
        name: "Unit testing on ${{ matrix.os }}"
        runs-on: "${{ matrix.os }}"

        strategy:
            fail-fast: false
            matrix:
                os:
                    - ubuntu-latest
                    - macos-latest
                    - windows-latest

        steps:
            - name: "Check out the repo"
              uses: "actions/checkout@v7"

            - name: "Set up Python"
              uses: "actions/setup-python@v6"
              with:
                  python-version: |
                    3.11
                    3.12

            - name: "Install Fortran Compiler and OpenBLAS"
              run: |
                  if [[ "$RUNNER_OS" == "macOS" ]]; then
                    brew install gcc
                    echo "FC=gfortran" >> $GITHUB_ENV
                    brew install openblas pkgconfig
                  else
                    echo "No action needed for Fortran compiler on $RUNNER_OS"
                  fi

            - name: Set OpenBLAS paths
              run: |
                if [[ "$RUNNER_OS" == "macOS" ]]; then
                  # Dynamically determine the Homebrew prefix
                  BREW_PREFIX=$(brew --prefix openblas)

                  # Inject paths into the environment for compilers/linkers
                  echo "LDFLAGS=-L${BREW_PREFIX}/lib" >> $GITHUB_ENV
                  echo "CPPFLAGS=-I${BREW_PREFIX}/include" >> $GITHUB_ENV
                  echo "PKG_CONFIG_PATH=${BREW_PREFIX}/lib/pkgconfig" >> $GITHUB_ENV

                  # Also useful if your build relies on CMake
                  echo "OpenBLAS_DIR=${BREW_PREFIX}" >> $GITHUB_ENV
                else
                  echo "No additional OpenBLAS build steps needed for $RUNNER_OS"
                fi

            - name: "Install dependencies"
              run: |
                  python -m pip install --upgrade pip
                  python -m pip install nox poetry
                  poetry self add poetry-plugin-export

            - name: "Get public IP address of runner"
              # Need to handle this for Windows, MacOS, and linux
              # Fetch from ipinfo.io/ip and echo it
              run: |
                  if [[ "$RUNNER_OS" == "Windows" ]]; then
                    echo "Windows runner IP: $(curl -s https://ipinfo.io/ip)"
                  elif [[ "$RUNNER_OS" == "macOS" ]]; then
                    echo "macOS runner IP: $(curl -s https://ipinfo.io/ip)"
                  else
                    echo "Linux runner IP: $(curl -s https://ipinfo.io/ip)"
                  fi

            - name: "Run nox"
              run: |
                  # Unit tests
                  python -m nox -r -vv

            - name: "Upload coverage data"
              uses: actions/upload-artifact@v7
              with:
                  name: covdata
                  path: .coverage.*

